name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build check
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" ./...
